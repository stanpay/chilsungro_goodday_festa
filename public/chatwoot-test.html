<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatwoot 위젯 격리 테스트</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.6;
        color: #1a1a1a;
      }
      h1 { font-size: 20px; }
      code { background: #f1f1f1; padding: 2px 6px; border-radius: 4px; }
      #status {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 8px;
        font-weight: 600;
      }
      .pending { background: #fff7e6; color: #b26a00; }
      .ok { background: #e7f7ed; color: #1a7f37; }
      .fail { background: #fdecea; color: #c0392b; }
      ol { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 16px 16px 16px 36px; }
    </style>
  </head>
  <body>
    <h1>Chatwoot 위젯 격리 테스트</h1>
    <p>
      우리 React 앱과 분리된 상태에서 Chatwoot 위젯과 백엔드 서버 연결만 검증하는 페이지입니다.
      <br />현재 <code id="baseUrlLabel"></code> 로 SDK를 로드합니다.
    </p>

    <div id="status" class="pending">SDK 로드 대기 중...</div>

    <ol>
      <li>우측 하단에 채팅 런처 버튼이 뜨는지 확인</li>
      <li>개발자 도구 Network 탭에서 <code>packs/js/sdk.js</code> 응답이 200인지 확인</li>
      <li>채팅창을 열고 메시지를 보내 백엔드(Chatwoot)에 도달하는지 확인</li>
    </ol>

    <!-- ===== BASE_URL은 백엔드에서 받은 주소로 교체 ===== -->
    <script>
      window.chatwootSettings = { position: "right", type: "standard", launcherTitle: "" };
      (function (d, t) {
        var BASE_URL = "https://mac.kurl.kr:3001";

        document.getElementById("baseUrlLabel").textContent = BASE_URL;
        var statusEl = document.getElementById("status");

        var g = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
        g.src = BASE_URL + "/packs/js/sdk.js";
        g.async = true;
        g.onerror = function () {
          statusEl.className = "fail";
          statusEl.textContent =
            "sdk.js 로드 실패 - BASE_URL(" + BASE_URL + ") 에 Chatwoot 서버가 떠 있는지 확인하세요.";
        };
        s.parentNode.insertBefore(g, s);
        g.onload = function () {
          statusEl.className = "ok";
          statusEl.textContent = "sdk.js 로드 성공 - 우측 하단 런처 버튼을 확인하세요.";
          window.chatwootSDK.run({
            websiteToken: "MekuFo3qfwTsHorEnJEYHMDG",
            baseUrl: BASE_URL,
          });
        };
      })(document, "script");
    </script>
  </body>
</html>
